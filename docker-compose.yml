services:
  kirakira-frontend:
    # Frontend
    container_name: kirakira-frontend
    image: kirakira-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3003"
    restart: unless-stopped
    networks:
      - kirakira-net

  kirakira-backend:
    # Backend (FastAPI)
    container_name: kirakira-backend
    image: kirakira-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8003"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://kirakira:kirakira123@192.168.0.1:5432/kirakira
      - FRONTEND_URL=https://kirakira.cukee.world
    volumes:
      - uploads_data:/app/uploads
      - ./database:/app/database:ro
    restart: unless-stopped
    networks:
      - kirakira-net

volumes:
  uploads_data:

networks:
  kirakira-net:
    external: true
